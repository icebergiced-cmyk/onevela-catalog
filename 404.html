<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>ไม่พบหน้านี้ · วันเวลา · One Vela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<style>
  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }
  .code {
    font-family: 'Inter', sans-serif;
    font-size: 180px;
    line-height: 1;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: -8px;
    margin-bottom: 18px;
  }
  .msg {
    font-size: 24px;
    font-weight: 400;
    max-width: 460px;
    margin-bottom: 12px;
  }
  .sub {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
    max-width: 420px;
  }
  .links {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .links a {
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: var(--transition);
  }
  .links a.primary { background: var(--charcoal); color: var(--cream); }
  .links a.secondary { border: 1px solid var(--charcoal); color: var(--charcoal); }
  .links a:hover { background: var(--gold); color: var(--cream); border-color: transparent; transform: translateY(-2px); }
</style>
</head>
<body>
<div class="code">404</div>
<h1 class="msg">หน้านี้ไม่อยู่ในแคตตาลอค</h1>
<p class="sub">บางทีลิงก์อาจเก่า หรือหน้าถูกย้ายไปแล้ว — ลองกลับไปหน้าแรก หรือเปิดแคตตาลอคใหม่</p>
<div class="links">
  <a href="/" class="primary">← กลับหน้าแรก</a>
  <a href="/catalog.html" class="secondary">เปิดแคตตาลอค</a>
</div>
</body>
</html>
